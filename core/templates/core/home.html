{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRU Cache Demo</title>

    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>

    <div class="container">
        <h1>LRU Cache Demo</h1>

        <form method="GET">
            <label for="n">Enter N (0 - 1,000,000,000)</label>

            <input
                type="number"
                id="n"
                name="n"
                min="0"
                max="1000000000"
                placeholder="Enter a value"
                required
            >

            <button type="submit">
                Calculate
            </button>
        </form>

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="clear">

            <button type="submit" class="clear-btn">
                Clear Cache
            </button>
        </form>

        <div class="results">
            <h2>Results</h2>

            <p>
                <strong>Sum till {{ n }}:</strong>
                {{ sum }}
            </p>

            <p>
                <strong>Time Taken:</strong>
                {{ time_taken }}
            </p>

            <p>
                <strong>Cache Status:</strong>
                {{ cache_status }}
            </p>
        </div>
    </div>

</body>
</html>
